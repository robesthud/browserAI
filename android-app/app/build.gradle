plugins {
    id 'com.android.application'
}

android {
    namespace 'ai.browser.app'
    compileSdk 35

    signingConfigs {
        browserAiDebug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    defaultConfig {
        applicationId 'ai.browser.app'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.browserAiDebug
        }
    }
}


dependencies {
    implementation 'androidx.core:core:1.13.1'
}
