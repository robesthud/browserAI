worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Standard Docker DNS resolver (crucial for deferred name resolution)
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to Fastify backend using variables so Nginx doesn't crash on start
        location /api/ {
            set $backend_upstream http://backend:3000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Fallback retry on 502/error
            proxy_next_upstream error timeout http_502;
        }

        # Proxy WebSockets to Fastify backend using variables so Nginx doesn't crash on start
        location /ws {
            set $backend_upstream http://backend:3000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            # Fallback retry on 502/error
            proxy_next_upstream error timeout http_502;
        }
    }
}
