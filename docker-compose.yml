# ============================================
# AI CODE STUDIO - MASTER DOCKER COMPOSE
# Optimized for PaaS platforms (Railway, Render) with healthchecks and restarts
# ============================================

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: aicode-postgres
    environment:
      POSTGRES_DB: aicode
      POSTGRES_USER: aicode
      POSTGRES_PASSWORD: supersecret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicode -d aicode"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicode_network
    restart: on-failure

  # ============================================
  # Redis Cache & Pub/Sub
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aicode-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicode_network
    restart: on-failure

  # ============================================
  # Node.js Backend API Server (Fastify)
  # ============================================
  backend:
    build:
      context: ./public/backend
      dockerfile: Dockerfile
    container_name: aicode-backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aicode:supersecret@postgres:5432/aicode
      REDIS_URL: redis://redis:6379
      CODE_RUNNER_URL: http://code-runner:8000
      BROWSER_AI_URL: http://browser-agent:8080
      COLLABORATION_URL: http://collaboration:3001
    volumes:
      - ./data/projects:/app/data/projects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicode_network
    restart: on-failure

  # ============================================
  # Code Runner (FastAPI + Docker SDK)
  # ============================================
  code-runner:
    build:
      context: ./code-runner
      dockerfile: Dockerfile
    container_name: aicode-runner
    ports:
      - "8000:8000"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - aicode_network
    restart: on-failure

  # ============================================
  # Browser Agent (Playwright)
  # ============================================
  browser-agent:
    build:
      context: ./browser-ai
      dockerfile: Dockerfile
    container_name: aicode-browser
    ports:
      - "8080:8080"
    shm_size: 2gb
    environment:
      HEADLESS: "true"
    networks:
      - aicode_network
    restart: on-failure

  # ============================================
  # Collaboration Server (Yjs)
  # ============================================
  collaboration:
    build:
      context: ./collaboration
      dockerfile: Dockerfile
    container_name: aicode-collab
    ports:
      - "3001:3001"
    networks:
      - aicode_network
    restart: on-failure

  # ============================================
  # Frontend Application (Nginx)
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: aicode-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aicode_network
    restart: on-failure

# ============================================
# Networks & Volumes Definitions
# ============================================
networks:
  aicode_network:
    name: aicode_network
    driver: bridge

volumes:
  postgres_data:
