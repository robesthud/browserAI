services:
  browserai:
    build: .
    image: browserai:latest
    container_name: browserai
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      # DeepSeek managed-session env (optional bootstrap, can be set later via UI/TG)
      - DEEPSEEK_STATE_FILE=/data/deepseek_session.json
      - CHAT_DEBUG_LOG=/data/chat-debug.log
      # - DEEPSEEK_USER_TOKEN=
      # - DEEPSEEK_COOKIES=
      # Telegram bot (optional)
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_ADMIN_CHAT_ID=${TG_ADMIN_CHAT_ID:-}
      # App-level secrets
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - APP_URL=${APP_URL:-http://localhost}
    # Bind-mounts: state lives on the host filesystem, visible with plain ls,
    # easy to rsync / backup, completely independent from docker volumes so
    # `docker compose down -v` does NOT touch it.
    #
    # Override the host paths via .env if you want different locations:
    #   DATA_DIR=/srv/browserai/data
    #   WORKSPACE_DIR=/srv/browserai/workspace
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${WORKSPACE_DIR:-./workspace}:/workspace

