name: Release Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set release version
        working-directory: android-app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os, re
          run_number = os.environ['GITHUB_RUN_NUMBER']
          p = Path('app/build.gradle')
          s = p.read_text()
          s = re.sub(r'versionCode\s+\d+', f'versionCode {run_number}', s)
          s = re.sub(r"versionName\s+'[^']+'", f"versionName '1.0.{run_number}'", s)
          p.write_text(s)
          PY

      - name: Build release APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android-app/app/build/outputs/apk/debug/app-debug.apk release/BrowserAI-${{ github.run_number }}.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create android-v${{ github.run_number }} \
            release/BrowserAI-${{ github.run_number }}.apk \
            --title "BrowserAI Android v${{ github.run_number }}" \
            --notes "Android APK build ${{ github.run_number }}. Install this APK on your Android device."
