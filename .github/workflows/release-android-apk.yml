name: Release Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # #23 FIX: keystore из зашифрованного GitHub Secret, не из cache
      - name: Restore signing key from secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/app/debug.keystore
          else
            keytool -genkeypair -v \
              -keystore android-app/app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=BrowserAI,C=US"
          fi

      - name: Set release version
        working-directory: android-app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os, re
          run_number = os.environ['GITHUB_RUN_NUMBER']
          p = Path('app/build.gradle')
          s = p.read_text()
          s = re.sub(r'versionCode\s+\d+', f'versionCode {run_number}', s)
          s = re.sub(r"versionName\s+'[^']+'", f"versionName '1.0.{run_number}'", s)
          p.write_text(s)
          PY

      # #14 FIX: используем assembleRelease вместо assembleDebug для production APK
      - name: Build release APK
        working-directory: android-app
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android-app/app/build/outputs/apk/release/app-release.apk release/BrowserAI-${{ github.run_number }}.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create android-v${{ github.run_number }} \
            release/BrowserAI-${{ github.run_number }}.apk \
            --title "BrowserAI Android v${{ github.run_number }}" \
            --notes "Android APK build ${{ github.run_number }}. Install this APK on your Android device."
