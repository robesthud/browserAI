name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # #23 FIX: keystore восстанавливается из зашифрованного GitHub Secret (KEYSTORE_BASE64),
      # а не из публичного cache. Добавьте KEYSTORE_BASE64 в Settings → Secrets → Actions.
      # Генерация: base64 -w 0 android-app/app/debug.keystore | pbcopy
      - name: Restore signing key from secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/app/debug.keystore
            echo "Keystore restored from secret"
          else
            echo "KEYSTORE_BASE64 secret not set — generating a new debug keystore (not stable across runs)"
            keytool -genkeypair -v \
              -keystore android-app/app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=BrowserAI,C=US"
          fi

      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrowserAI-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
