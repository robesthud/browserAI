name: Monthly Auto Release

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish GitHub Release after building APK'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: monthly-android-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish monthly APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Restore or create signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android-app/app/debug.keystore
          elif [ -f "android-app/app/debug.keystore" ]; then
            echo "✓ Keystore found in repo"
          else
            keytool -genkeypair -v \
              -keystore android-app/app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=BrowserAI,C=US"
          fi

      - name: Set version from date
        working-directory: android-app
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          version_code = int(now.strftime('%Y%m%d'))
          version_name = f"{now.year}.{now.month}.{now.day}"

          p = Path('app/build.gradle')
          s = p.read_text()
          s = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', s)
          s = re.sub(r"versionName\s+'[^']+'", f"versionName '{version_name}'", s)
          p.write_text(s)
          print(f"Version: {version_name} ({version_code})")
          PY

      - name: Build release APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon --stacktrace || gradle assembleRelease --no-daemon --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION=$(date -u +"%Y.%-m.%-d")
          TAG="android-v$(date -u +"%Y%m%d")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          set -euo pipefail
          mkdir -p release
          cp android-app/app/build/outputs/apk/release/app-release.apk \
             "release/BrowserAI-${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'schedule' || inputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete "${{ steps.version.outputs.tag }}" --yes 2>/dev/null || true
          gh release create "${{ steps.version.outputs.tag }}" \
            "release/BrowserAI-${{ steps.version.outputs.version }}.apk" \
            --title "BrowserAI Android ${{ steps.version.outputs.version }}" \
            --notes "Ежемесячный автоматический релиз ${{ steps.version.outputs.version }}.

Установи APK на Android устройство для получения последних обновлений.

Что нового: актуальная версия сервера и безопасности." \
            --latest

      - name: Summary
        if: always()
        run: |
          echo "### Monthly Android release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "* status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* ref: ${{ github.ref }}" >> "$GITHUB_STEP_SUMMARY"
