name: Deploy to Timeweb (staging)

on:
  push:
    branches: [staging]
    paths-ignore:
      - '**/*.md'
      - 'android-app/**'
      - 'cf-proxy/**'
  workflow_dispatch:

concurrency:
  group: deploy-timeweb-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull + rebuild on Timeweb STAGING
    runs-on: ubuntu-latest
    environment: staging
    env:
      HAS_TIMEWEB_STAGING_SECRETS: ${{ secrets.TIMEWEB_STAGING_SSH_KEY != '' && secrets.TIMEWEB_STAGING_HOST != '' && secrets.TIMEWEB_STAGING_USER != '' && secrets.TIMEWEB_STAGING_APP_DIR != '' }}

    steps:
      - name: Checkout (for audit only)
        uses: actions/checkout@v5

      - name: Configure SSH
        if: env.HAS_TIMEWEB_STAGING_SECRETS == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.TIMEWEB_STAGING_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.TIMEWEB_STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy current staging to Timeweb
        if: env.HAS_TIMEWEB_STAGING_SECRETS == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TIMEWEB_STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.TIMEWEB_STAGING_USER }}
          APP_DIR: ${{ secrets.TIMEWEB_STAGING_APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "APP_DIR='${APP_DIR}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch --quiet origin staging
          git checkout staging || git checkout -b staging origin/staging
          git reset --hard origin/staging
          git clean -fd
          docker compose up -d --build --force-recreate --remove-orphans browserai
          curl -fsS http://localhost:8080/ >/dev/null || curl -fsS http://localhost/api/health >/dev/null
          REMOTE

      - name: Skip staging deploy notice
        if: env.HAS_TIMEWEB_STAGING_SECRETS != 'true'
        run: |
          echo "::notice::Timeweb staging deploy skipped: staging secrets are not configured."
          echo "### Timeweb staging deploy skipped" >> $GITHUB_STEP_SUMMARY

      - name: Post-deploy summary
        if: always()
        run: |
          echo "### Timeweb staging deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
