name: Deploy to Timeweb

# Triggers:
#   - any push to main (skipped if only docs / android / cf-proxy changed)
#   - manual via "Run workflow"
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'android-app/**'
      - 'cf-proxy/**'
      - '.github/workflows/build-android-apk.yml'
      - '.github/workflows/release-android-apk.yml'
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull + rebuild on Timeweb VPS
    runs-on: ubuntu-latest
    environment: production
    env:
      HAS_TIMEWEB_SECRETS: ${{ secrets.TIMEWEB_SSH_KEY != '' && secrets.TIMEWEB_HOST != '' && secrets.TIMEWEB_USER != '' && secrets.TIMEWEB_APP_DIR != '' }}

    steps:
      - name: Checkout (for audit only)
        uses: actions/checkout@v4

      - name: Configure SSH
        if: env.HAS_TIMEWEB_SECRETS == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.TIMEWEB_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: git pull + docker compose up -d --build
        if: env.HAS_TIMEWEB_SECRETS == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.TIMEWEB_HOST }}
          DEPLOY_USER: ${{ secrets.TIMEWEB_USER }}
          APP_DIR:     ${{ secrets.TIMEWEB_APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "bash -c '
               set -euo pipefail
               cd \"${APP_DIR}\"
               
               export \$(grep -v \"^#\" .env | grep -v \"^$\" | xargs)
               send_tg() {
                 if [ -n \"\${TG_BOT_TOKEN:-}\" ] && [ -n \"\${TG_ADMIN_CHAT_ID:-}\" ]; then
                   curl -s -X POST \"https://api.telegram.org/bot\${TG_BOT_TOKEN}/sendMessage\" \
                        -d chat_id=\"\${TG_ADMIN_CHAT_ID}\" \
                        -d parse_mode=\"HTML\" \
                        --data-urlencode \"text=\$1\" > /dev/null || true
                 fi
               }
               
               trap '\''send_tg \"❌ <b>BrowserAI</b>: Ошибка деплоя! (коммит <code>${{ github.sha }}</code>)\"'\'' ERR
               send_tg \"🚀 <b>BrowserAI</b>: Начат деплой (коммит <code>${{ github.sha }}</code>)...\"
               
               echo \"── git pull ──\"
               git fetch --quiet origin main
               # If the server repo was ever left in sparse-checkout mode, tracked
               # files can be absent from the Docker build context while GitHub
               # still reports a successful checkout. Disable sparse mode before
               # reset so files imported by Node really exist in the image.
               git sparse-checkout disable 2>/dev/null || true
               git reset --hard origin/main
               git clean -fd
               echo \"── verify required files ──\"
               test -f server/telegramBot.js
               test -f server/index.js
               echo \"── docker compose up -d --build --force-recreate --remove-orphans ──\"
               docker compose up -d --build --force-recreate --remove-orphans browserai
               echo \"── prune dangling images ──\"
               docker image prune -f
               echo \"── health ──\"
               sleep 10
               curl -fsS http://localhost/api/health || curl -fsS http://localhost:8080/api/health
               docker ps --filter name=browserai || true
               
               send_tg \"✅ <b>BrowserAI</b>: Деплой успешно завершен! (коммит <code>${{ github.sha }}</code>)\"
               '"

      - name: Skip deploy notice
        if: env.HAS_TIMEWEB_SECRETS != 'true'
        run: |
          echo "::notice::Timeweb deploy skipped: set TIMEWEB_SSH_KEY, TIMEWEB_HOST, TIMEWEB_USER and TIMEWEB_APP_DIR secrets to enable automatic deploy."
          echo "### Timeweb deploy skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Required secrets are not configured. CI still validates build/runtime checks." >> $GITHUB_STEP_SUMMARY

      - name: Post-deploy summary
        if: always()
        run: |
          echo "### Timeweb deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* actor:  \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
